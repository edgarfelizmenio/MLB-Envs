name: HGCTSVG
channels:
  - main
  - conda-forge
  - bioconda
dependencies:
  - python==3.12
  - pip
  - setuptools
  - ipykernel
  - jupyterlab_widgets
  - ipywidgets
  - cuda-cudart
  - cuda-version=12
  - requests_cache
  - pybiomart
  - scanpy
  - python-igraph
  - leidenalg
  - squidpy 
  - pip:
    - captum
    - cyclopts
prefix: /opt/conda/envs/HGCTSVG

