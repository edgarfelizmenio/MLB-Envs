name: HyperSpot
channels:
  - https://repo.anaconda.com/pkgs/main
  - https://repo.anaconda.com/pkgs/r
dependencies:
  - python==3.12.2
  - pip
  - setuptools
  - ipykernel
  - ipywidgets
  # - nvidia::cuda-cudart
  # - pytorch::pytorch==2.5.1
  # - pytorch::torchaudio==2.5.1
  # - pytorch::pytorch-cuda=11.8
  - python-igraph
  - leidenalg
  - conda-forge::jupyterlab_widgets
  - nodejs
  - squidpy=1.6.5
  - conda-forge::requests_cache
  - conda-forge::imagecodecs
  - bioconda::pybiomart
  - cudatoolkit 
  - cuda-version=11
  - ipywidgets
  - pip:
    - pyg_lib==0.5.0+pt26cu118
    - scanpy==1.11.1
    - torch==2.6.0+cu118
    - torch_cluster==1.6.3+pt26cu118
    - torch-geometric==2.7.0
    - torch_scatter==2.1.2+pt26cu118
    - torch_sparse==0.6.18+pt26cu118
    - torch_spline_conv==1.2.2+pt26cu118
    - torchaudio==2.6.0+cu118
    - torchvision==0.22.1+cu118
    - scikit-misc==0.5.1
    - pytorch-lightning==2.5.2
    - captum==0.8.0
    - cyclopts==3.24.0
    - numpy==2.3.0
prefix: /opt/conda/envs/HyperSpot

